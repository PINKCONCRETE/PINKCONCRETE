      <text x="18" y="23" fill="#38bdf8" font-size="13" font-weight="700">01 YOLO26-Tools</text>
      <text x="18" y="41" fill="#cbd5e1" font-size="12">dataset + detection</text>
    </g>
    <g transform="translate(292 244)">
      <rect width="188" height="52" rx="12" fill="#020617" fill-opacity="0.7" stroke="#334155"/>
      <text x="18" y="23" fill="#f97316" font-size="13" font-weight="700">02 RoboAutoTask</text>
      <text x="18" y="41" fill="#cbd5e1" font-size="12">robot automation</text>
    </g>
    <g transform="translate(500 244)">
      <rect width="152" height="52" rx="12" fill="#020617" fill-opacity="0.7" stroke="#334155"/>
      <text x="18" y="23" fill="#93c5fd" font-size="13" font-weight="700">03 openarm</text>
      <text x="18" y="41" fill="#cbd5e1" font-size="12">C++ control</text>
