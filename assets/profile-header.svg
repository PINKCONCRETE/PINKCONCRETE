<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Dihan Wang profile header</title>
  <desc id="desc">A dark robotics portfolio header with ranked project signals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.48" stop-color="#111827"/>
      <stop offset="1" stop-color="#062f2f"/>
    </linearGradient>
    <linearGradient id="line" x1="140" y1="80" x2="1040" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="0.45" stop-color="#f97316"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="0" fill="url(#bg)"/>
  <g opacity="0.16">
    <path d="M0 74H1200M0 134H1200M0 194H1200M0 254H1200M0 314H1200" stroke="#E5E7EB"/>
    <path d="M78 0V360M178 0V360M278 0V360M378 0V360M478 0V360M578 0V360M678 0V360M778 0V360M878 0V360M978 0V360M1078 0V360" stroke="#E5E7EB"/>
  </g>
  <circle cx="1000" cy="92" r="120" fill="#0f766e" opacity="0.24" filter="url(#soft)"/>
  <circle cx="228" cy="278" r="120" fill="#1d4ed8" opacity="0.22" filter="url(#soft)"/>

  <path d="M146 247C242 135 338 115 458 182C587 254 657 244 778 139C879 52 969 80 1054 154" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>
  <path d="M146 247C242 135 338 115 458 182C587 254 657 244 778 139C879 52 969 80 1054 154" stroke="#ffffff" stroke-opacity="0.18" stroke-width="15" stroke-linecap="round"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="72" y="94" fill="#94a3b8" font-size="16" letter-spacing="3">PINKCONCRETE / ROBOTICS SOFTWARE</text>
    <text x="72" y="154" fill="#f8fafc" font-size="56" font-weight="750">Dihan Wang</text>
    <text x="76" y="198" fill="#cbd5e1" font-size="22">Perception pipelines, robot control, and embodied AI experiments.</text>

    <g transform="translate(78 244)">
