<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Dihan Wang profile header</title>
  <desc id="desc">A dark robotics portfolio header with four ranked primary projects.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.42" stop-color="#111827"/>
      <stop offset="1" stop-color="#06332f"/>
    </linearGradient>
    <linearGradient id="line" x1="126" y1="252" x2="1048" y2="124" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f97316"/>
      <stop offset="0.32" stop-color="#38bdf8"/>
      <stop offset="0.68" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#93c5fd"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <g opacity="0.14">
    <path d="M0 74H1200M0 134H1200M0 194H1200M0 254H1200M0 314H1200" stroke="#E5E7EB"/>
    <path d="M78 0V360M178 0V360M278 0V360M378 0V360M478 0V360M578 0V360M678 0V360M778 0V360M878 0V360M978 0V360M1078 0V360" stroke="#E5E7EB"/>
  </g>
  <circle cx="1046" cy="92" r="120" fill="#0f766e" opacity="0.24" filter="url(#soft)"/>
  <circle cx="208" cy="282" r="120" fill="#1d4ed8" opacity="0.22" filter="url(#soft)"/>

  <path d="M132 250C230 138 346 122 454 184C566 248 662 240 770 154C876 70 962 82 1058 142" stroke="#ffffff" stroke-opacity="0.16" stroke-width="16" stroke-linecap="round"/>
  <path d="M132 250C230 138 346 122 454 184C566 248 662 240 770 154C876 70 962 82 1058 142" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="72" y="94" fill="#94a3b8" font-size="16" letter-spacing="3">PINKCONCRETE / ROBOTICS PORTFOLIO</text>
    <text x="72" y="154" fill="#f8fafc" font-size="56" font-weight="750">Dihan Wang</text>
    <text x="76" y="198" fill="#cbd5e1" font-size="22">Automation, scene data, embodied pipelines, and non-contact sensing.</text>

    <g transform="translate(78 244)">
      <rect width="188" height="52" rx="12" fill="#020617" fill-opacity="0.72" stroke="#334155"/>
      <text x="18" y="23" fill="#f97316" font-size="13" font-weight="700">01 RoboAutoTask</text>
      <text x="18" y="41" fill="#cbd5e1" font-size="12">robot automation</text>
    </g>
    <g transform="translate(286 244)">
      <rect width="190" height="52" rx="12" fill="#020617" fill-opacity="0.72" stroke="#334155"/>
      <text x="18" y="23" fill="#38bdf8" font-size="13" font-weight="700">02 SceneAnnotation</text>
      <text x="18" y="41" fill="#cbd5e1" font-size="12">scene data tools</text>
    </g>
    <g transform="translate(496 244)">
      <rect width="202" height="52" rx="12" fill="#020617" fill-opacity="0.72" stroke="#334155"/>
      <text x="18" y="23" fill="#2dd4bf" font-size="13" font-weight="700">03 robocoin-pipeline</text>
      <text x="18" y="41" fill="#cbd5e1" font-size="12">embodied pipeline</text>
    </g>
    <g transform="translate(718 244)">
      <rect width="188" height="52" rx="12" fill="#020617" fill-opacity="0.72" stroke="#334155"/>
      <text x="18" y="23" fill="#93c5fd" font-size="13" font-weight="700">04 MMW Monitor</text>
      <text x="18" y="41" fill="#cbd5e1" font-size="12">vital-sign sensing</text>
    </g>
